name: Deploy Streamlit App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline to Ensure Artifacts
        run: |
          python ml_pipeline.py

      - name: Verify App Compiles
        run: |
          python -m py_compile app.py

      - name: Summary
        run: |
          echo "Streamlit app is ready for deployment."
          echo "To host this app, connect your GitHub repository to [Streamlit Community Cloud](https://share.streamlit.io/)."
